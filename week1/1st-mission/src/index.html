<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASHA TODO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-wrapper"> <h1 class="todo__title">MASHA TODO</h1>

        <div class="todo__input-group">
            <input type="text" class="todo__input" placeholder="할 일 입력">
            <button class="todo__add-btn">할 일 추가</button>
        </div>

        <div class="todo__lists-container">
            <section class="todo__section">
                <h2 class="todo__subtitle">할 일</h2>
                <ul id="active-list" class="todo__list"></ul>
            </section>

            <section class="todo__section">
                <h2 class="todo__subtitle">완료</h2>
                <ul id="completed-list" class="todo__list todo__list--completed"></ul>
            </section>
        </div>
    </div>
    <script src="../dist/main.js" defer></script>
</body>
</html>
